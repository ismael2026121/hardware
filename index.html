<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso Hardware - ASIR1</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .mode-selector { text-align: center; margin-bottom: 25px; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        button.active { background-color: #2c3e50; font-weight: bold; }
        .question-block { border-bottom: 1px solid #eee; padding: 20px 0; }
        .question-text { font-weight: bold; font-size: 17px; margin-bottom: 12px; }
        .option { display: block; background: #f9f9f9; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
        .option:hover { background: #f0f0f0; }
        .feedback { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; font-weight: bold; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .explanation { font-weight: normal; font-size: 14px; margin-top: 5px; color: #555; }
        #exam-submit { display: block; width: 100%; margin-top: 20px; background-color: #27ae60; font-size: 18px; }
        #exam-submit:hover { background-color: #219653; }
        #result-box { display: none; margin-top: 20px; padding: 15px; text-align: center; font-size: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🖥️ Cuestionario: Periféricos y Buses (ASIR1)</h1>
    
    <div class="mode-selector">
        <button id="btn-practice" class="active" onclick="setMode('practica')">Modo Práctica</button>
        <button id="btn-exam" onclick="setMode('exam')">Modo Examen</button>
    </div>

    <div id="quiz-container"></div>
    
    <button id="exam-submit" style="display: none;" onclick="evaluateExam()">Finalizar y Calificar Examen</button>
    <div id="result-box"></div>
</div>

<script src="preguntas.js"></script>
<script src="script.js"></script>
</body>
</html>
